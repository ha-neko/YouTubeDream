name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || '' }}

      - name: Build debug APK (testing)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build release APK (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign release APK (if keystore provided)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS || 'upload' }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > keystore.jks
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore keystore.jks \
              -storepass "$KEYSTORE_PASS" \
              android/app/build/outputs/apk/release/app-release-unsigned.apk \
              "$KEYSTORE_ALIAS"
            rm keystore.jks
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-dream-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK artifact (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: youtube-dream-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Release APK (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
